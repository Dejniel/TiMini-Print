name: CI

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test ${{ matrix.platform_name }} ${{ matrix.arch_name }} Python ${{ matrix.python_version }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform_name: Linux
            arch_name: x86_64
            python_version: "3.11"
          - runner: ubuntu-22.04-arm
            platform_name: Linux
            arch_name: arm64
            python_version: "3.11"
          - runner: windows-latest
            platform_name: Windows
            arch_name: x86_64
            python_version: "3.11"
          - runner: macos-15
            platform_name: macOS
            arch_name: arm64
            python_version: "3.11"
          - runner: macos-15-intel
            platform_name: macOS
            arch_name: x86_64
            python_version: "3.11"
          - runner: ubuntu-22.04
            platform_name: Linux
            arch_name: x86_64
            python_version: "3.8"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        shell: bash
        run: python -m unittest discover -s tests -p 'test_*.py'
