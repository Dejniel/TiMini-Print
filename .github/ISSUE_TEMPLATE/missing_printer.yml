name: Missing printer support
description: Request support for a printer that TiMini does not detect or does not list.
title: "Missing printer: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Use this when your printer is not detected, is not listed, or TiMini does not have a matching profile for it.

        Keep one issue focused on one problem.

        Please also follow up in this thread if I ask for details; issues that go stale without enough information may be closed.

        Please include the original app link. Without the original app or verbose scan output, adding support may be impossible.

        Run this scan and paste the full output below:

        ```bash
        ./TiMini-Print-Command-Line-Linux-x86_64 -v --scan
        ```

        If you can attach a Bluetooth/HCI dump of one small print from the original app, it will usually make adding support much faster.

  - type: input
    id: original-app
    attributes:
      label: Original app
      description: Link or name of the app from the manual, QR code, or app store. Google Play/App Store links are best.
      placeholder: "Example: Fun Print / https://play.google.com/store/apps/details?id=..."
    validations:
      required: true

  - type: textarea
    id: scan-log
    attributes:
      label: Full verbose scan output
      description: Run scan with `-v` and paste the complete output.
      placeholder: Paste the complete verbose scan output here.
    validations:
      required: true

  - type: textarea
    id: original-app-dump
    attributes:
      label: Original app Bluetooth/HCI dump
      description: Optional. Attach the dump file or paste a link.
      placeholder: "Attach the dump file to this issue, or paste a link here."
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Optional. Describe the printer/support request in your own words. Add photos, logs, or packet dumps if available.
    validations:
      required: false
